name: Price Watcher

on:
  schedule:
    - cron: '*/15 * * * *'  # cada 15 minutos, las 24h
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: price-watcher
  cancel-in-progress: true  # si ya hay uno corriendo, cancela el anterior

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance

      - name: Check price vs alertas
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ ! -f data/alertas_activas.json ]; then
            echo "Sin plan de alertas — esperando primer análisis diario."
            exit 0
          fi
          PYTHONPATH=src python3 src/price_watcher.py

      - name: Commit si hubo alertas disparadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alertas_activas.json data/sigmaview.db
          git diff --staged --quiet || git commit -m "auto: alerta disparada $(date +%Y-%m-%dT%H:%M)" && git push || true
